spring:
  application:
    name: interview-shop
  datasource:
    url: jdbc:h2:mem:shopdb
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true  # CASE 13: H2 console enabled without profile guard — security risk in production
  jpa:
    hibernate:
      ddl-auto: update  # CASE 21: ddl-auto co-exists with Flyway — confusing and dangerous
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8080

logging:
  level:
    com.sagax.shop: DEBUG
    org.hibernate.SQL: DEBUG
